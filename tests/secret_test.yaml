suite: secret
templates:
  - templates/secret.yaml
tests:
  - it: creates a Secret holding the inline key
    set:
      key.value: super-secret-key
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-fishnet
      - equal:
          path: stringData.KEY
          value: super-secret-key

  - it: honours a custom secretKey name
    set:
      key.value: super-secret-key
      key.secretKey: TOKEN
    asserts:
      - equal:
          path: stringData.TOKEN
          value: super-secret-key

  - it: renders nothing when an existing secret is used
    set:
      key.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when no key is provided
    asserts:
      - failedTemplate:
          errorMessage: "You must set either key.value or key.existingSecret. Get a key from https://lichess.org/get-fishnet"

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.8.2

      - name: helm unittest
        run: helm unittest .

      - name: helm lint
        run: helm lint .

      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform

      - name: Validate rendered manifests
        run: |
          helm template t . --set key.value=ci-dummy-key \
            | kubeconform -strict -summary -ignore-missing-schemas
          helm template t . --set key.existingSecret=fishnet \
            | kubeconform -strict -summary -ignore-missing-schemas

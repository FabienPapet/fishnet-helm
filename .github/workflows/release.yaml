name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  package-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Derive chart version and lowercase owner
        id: ver
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.8.2

      - name: helm unittest
        run: helm unittest .

      - name: helm lint
        run: helm lint .

      - name: Package chart
        run: helm package . --version "${{ steps.ver.outputs.version }}" --app-version "${{ steps.ver.outputs.version }}"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Push OCI package
        run: helm push "fishnet-${{ steps.ver.outputs.version }}.tgz" "oci://ghcr.io/${{ steps.ver.outputs.owner }}/charts"

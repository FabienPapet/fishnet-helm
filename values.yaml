replicaCount: 1

image:
  repository: niklasf/fishnet
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# fishnet registration key obtained from https://lichess.org/get-fishnet
# Provide one of:
#   key.value          -- inline value, rendered into a chart-managed Secret
#   key.existingSecret -- name of a pre-existing Secret containing the key
key:
  # Inline key value. Leave empty if using an existing secret.
  value: ""
  # Name of an existing Secret to read the key from. Takes precedence over value.
  existingSecret: ""
  # Key within the Secret that holds the fishnet registration key.
  secretKey: KEY

deploymentAnnotations: {}
podAnnotations: {}
podLabels: {}

# Pod-level security context
podSecurityContext: {}
# Container-level security context
securityContext: {}

resources:
  limits:
    cpu: "7"
    memory: 1512Mi
  requests:
    cpu: "7"
    memory: 1512Mi

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

# Extra environment variables to inject into the container
extraEnv: []
#  - name: FOO
#    value: bar

nodeSelector: {}
tolerations: []
affinity: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}
